name: Code Lint & Quality Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  style-check:
    name: Code Style & Encoding Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      # 1. Install clang-format
      - name: Install Clang-Format
        run: |
          sudo apt-get update
          sudo apt-get install clang-format-15 -y

      # 2. Format C/C++ files
      - name: Format C/C++ Files
        run: |
          find module -type f \( -name "*.c" -o -name "*.h" \) -exec clang-format-15 -i {} +

      # 3. Commit and push any formatting changes back
      - name: Auto-commit formatted changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automatic clang-format"
          file_pattern: 'module/**/*.c module/**/*.h'

      # 4. Check file encoding (UTF-8 without BOM) and line endings (LF)
      - name: Check Line Endings & UTF-8 without BOM
        run: |
          errors=0
          files=$(find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.dts" -o -name "*.dtsi" -o -name "*.yaml" -o -name "*.yml" -o -name "Kconfig" -o -name "*_defconfig" -o -name "*.conf" \) -not -path "*/.git/*")
          for file in $files; do
            if file "$file" | grep -q "BOM"; then
              echo "::error file=$file::File contains a Byte Order Mark (BOM)."
              errors=$((errors+1))
            fi
            if file "$file" | grep -q "CRLF"; then
              echo "::error file=$file::File has CRLF line endings instead of LF."
              errors=$((errors+1))
            fi
          done
          if [ $errors -ne 0 ]; then
            echo "$errors formatting error(s) found."
            exit 1
          fi

  static-analysis:
    name: Cppcheck Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get install cppcheck -y

      - name: Run Cppcheck
        run: |
          # Suppress missingIncludeSystem warning to prevent failing on Zephyr system headers
          cppcheck --enable=warning,portability --suppress=missingIncludeSystem --error-exitcode=1 module/