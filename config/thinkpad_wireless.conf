# thinkpad_wireless.conf: User-level configuration for the Thinkpad Wireless keyboard.
# Edit this file to customize ZMK features and settings.
# Hardware-level defaults are in module/boards/thinkpad/thinkpad_wireless/thinkpad_wireless_defconfig.

# ----- Bluetooth -----
CONFIG_ZMK_BLE=y
CONFIG_ZMK_KEYBOARD_NAME="ThinkpadWireless"

# ----- Power Management -----
CONFIG_ZMK_SLEEP=y
# Idle -> Deep Sleep after 15 minutes (900,000 ms) of inactivity
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Enable poweroff subsystem for deep sleep
CONFIG_POWEROFF=y

# ----- External Power Control (5V Boost for TrackPoint) -----
CONFIG_ZMK_EXT_POWER=y

# ----- Battery -----
CONFIG_ZMK_BATTERY_REPORTING=y

# ----- TrackPoint (PS/2 Mouse) -----
CONFIG_ZMK_POINTING=y

# ----- HID Indicators (Caps Lock LED) -----
CONFIG_ZMK_HID_INDICATORS=y
